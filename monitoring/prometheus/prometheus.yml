global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: "converter-gateway"
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - gateway:8080
          - converter-gateway-service.default.svc.cluster.local:8080
          - host.docker.internal:8080
