name: CI-CD

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["*"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix src/main/frontend ci

      - name: Lint backend
        run: npm run lint

      - name: Lint frontend
        run: npm --prefix src/main/frontend run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install backend dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images (frontend + backend)
        run: |
          docker compose -p converterci build backend frontend

      - name: Save image tars
        run: |
          docker save converterci-backend:latest -o converter-backend-image.tar
          docker save converterci-frontend:latest -o converter-frontend-image.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: converter-docker-images
          path: |
            converter-backend-image.tar
            converter-frontend-image.tar

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images for scan
        run: docker compose -p converterci build backend frontend

      - name: Run Trivy scan (backend)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: converterci-backend:latest
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

      - name: Run Trivy scan (frontend)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: converterci-frontend:latest
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

  artifact:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload docs and manifests
        uses: actions/upload-artifact@v4
        with:
          name: project-deliverables
          path: |
            docs
            infrastructure/kubernetes
            monitoring

  deploy-placeholder:
    runs-on: ubuntu-latest
    needs: artifact
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Placeholder deploy step
        run: echo "Add your actual deploy command here (kubectl apply/helm/ArgoCD)."
