version: "3.9"
services:
  web:
    image: nginx:1.27
    ports:
      - "8080:80"
    environment:
      APP_ENV: dev
      API_TOKEN: super-secret
    depends_on:
      - redis
    volumes:
      - webdata:/usr/share/nginx/html
      - ./cache:/cache
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  webdata: {}
