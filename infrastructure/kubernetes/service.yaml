apiVersion: v1
kind: Service
metadata:
  name: converter-backend-service
  labels:
    app: converter-backend
spec:
  type: ClusterIP
  selector:
    app: converter-backend
  ports:
    - name: api
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: converter-frontend-service
  labels:
    app: converter-frontend
spec:
  type: ClusterIP
  selector:
    app: converter-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: converter-gateway-service
  labels:
    app: converter-gateway
spec:
  type: ClusterIP
  selector:
    app: converter-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
