apiVersion: v1
kind: ConfigMap
metadata:
  name: converter-backend-config
  labels:
    app: converter-backend
data:
  PORT: "3000"
  LOG_LEVEL: "info"
  UPLOAD_LIMIT_MB: "2"
  JOB_TTL_MINUTES: "30"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: converter-gateway-nginx
  labels:
    app: converter-gateway
data:
  nginx.conf: |
    events {}
    http {
      upstream converter_frontend {
        server converter-frontend-service:80;
      }
      upstream converter_backend {
        server converter-backend-service:3000;
      }
      server {
        listen 8080;
        server_name _;

        location = /api {
          proxy_pass http://converter_backend/api;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
          proxy_pass http://converter_backend;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
          proxy_pass http://converter_frontend;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
    }
